name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Frontend React application
  frontend-tests:
    runs-on: ubuntu-latest
    # This sets the working directory for all 'run' steps in this job
    defaults:
      run:
        working-directory: packages/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'packages/frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

      - name: Verify Production Build
        run: npm run build

  # Job 2: Local Python scripts
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Runs the standard unittest framework against your tests folder
      - name: Run Unittest Suite
        run: python -m unittest discover -s tests